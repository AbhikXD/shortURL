# 1. Point to the correct database name from your screenshot
spring.datasource.url=jdbc:postgresql://172.19.0.2:5432/UrlShortner

# 2. Ensure no trailing spaces after the password
spring.datasource.username=postgres
spring.datasource.password=postgres

# 3. Fix the typo: Change the comma (,) to a dot (.)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. Standard JPA settings
spring.jpa.generate-ddl = true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
debug=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
