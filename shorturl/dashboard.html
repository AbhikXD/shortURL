<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short URL Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            font-size: 1.5em;
        }

        .card h2::before {
            font-size: 1.2em;
            margin-right: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .code-block {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .activity-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .activity-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .activity-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .activity-item label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 8px;
        }

        .activity-item p {
            color: #333;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .redirect-link {
            margin-top: 15px;
        }

        .redirect-link a {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .redirect-link a:hover {
            background: #667eea;
            color: white;
        }

        .test-quick-btn {
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .activity-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 40px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 Short URL Dashboard</h1>
            <p>Test and manage your short URL service</p>
        </header>

        <div class="dashboard">
            <!-- Create Short URL Card -->
            <div class="card">
                <h2>➕ Create Short URL</h2>
                
                <div class="input-group">
                    <label for="longUrl">Enter your long URL</label>
                    <input 
                        type="text" 
                        id="longUrl" 
                        placeholder="https://example.com/very/long/url/path"
                    >
                </div>

                <div class="loading" id="createLoading">
                    <div class="spinner"></div>
                    <p>Creating short URL...</p>
                </div>

                <button onclick="createShortUrl()">Create Short URL</button>

                <div class="message" id="createMessage"></div>
            </div>

            <!-- Test Short URL Card -->
            <div class="card">
                <h2>🧪 Test Short URL</h2>
                
                <div class="input-group">
                    <label for="shortUrl">Enter short URL code or full URL</label>
                    <input 
                        type="text" 
                        id="shortUrl" 
                        placeholder="b, or full URL: http://localhost:8080/b"
                    >
                </div>

                <div class="loading" id="testLoading">
                    <div class="spinner"></div>
                    <p>Testing redirect...</p>
                </div>

                <button onclick="testShortUrl()">Test</button>

                <div class="message" id="testMessage"></div>
            </div>
        </div>

        <!-- Activity Section -->
        <div class="activity-section">
            <h2>📊 Recent Activity</h2>
            <div class="activity-grid">
                <div class="activity-item">
                    <label>Last Created Short URL</label>
                    <p id="lastShortUrl">No URL created yet</p>
                </div>
                <div class="activity-item">
                    <label>Original URL</label>
                    <p id="lastLongUrl">-</p>
                </div>
            </div>
            <button class="test-quick-btn" onclick="testLastCreatedUrl()">Test Last Created URL</button>
            <div class="message" id="quickTestMessage"></div>
        </div>

        <footer>
            <p>Short URL Dashboard | Testing Tool for Short URL Service</p>
        </footer>
    </div>

    <script>
        const API_URL = "http://localhost:8080";

        async function createShortUrl() {
            const longUrl = document.getElementById("longUrl").value.trim();
            const messageDiv = document.getElementById("createMessage");
            const loadingDiv = document.getElementById("createLoading");

            messageDiv.classList.remove("show");

            if (!longUrl) {
                showMessage(messageDiv, "Please enter a URL", "error");
                return;
            }

            if (!longUrl.startsWith("http://") && !longUrl.startsWith("https://")) {
                showMessage(messageDiv, "URL must start with http:// or https://", "error");
                return;
            }

            loadingDiv.style.display = "block";

            try {
                const response = await fetch(`${API_URL}/create`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ longUrl: longUrl })
                });

                loadingDiv.style.display = "none";

                if (response.ok) {
                    const shortUrl = await response.text();
                    showMessage(messageDiv, `✅ Short URL Created!<br><div class="code-block">${shortUrl.replace(/"/g, '')}</div>`, "success");

                    // Store in session storage
                    localStorage.setItem("lastShortUrl", shortUrl.replace(/"/g, ''));
                    localStorage.setItem("lastLongUrl", longUrl);
                    updateActivitySection();

                    document.getElementById("longUrl").value = "";
                } else {
                    showMessage(messageDiv, `Error: ${response.status} - ${await response.text()}`, "error");
                }
            } catch (error) {
                loadingDiv.style.display = "none";
                showMessage(messageDiv, `Cannot connect to API. Make sure the service is running at ${API_URL}`, "error");
                console.error(error);
            }
        }

        async function testShortUrl() {
            let shortUrl = document.getElementById("shortUrl").value.trim();
            const messageDiv = document.getElementById("testMessage");
            const loadingDiv = document.getElementById("testLoading");

            messageDiv.classList.remove("show");

            if (!shortUrl) {
                showMessage(messageDiv, "Please enter a short URL code", "error");
                return;
            }

            // Extract the code from full URL if needed
            if (shortUrl.startsWith("http://") || shortUrl.startsWith("https://")) {
                shortUrl = shortUrl.split("/").pop();
            }

            if (!shortUrl) {
                showMessage(messageDiv, "Invalid URL format", "error");
                return;
            }

            loadingDiv.style.display = "block";

            try {
                console.log(`Testing short URL: ${API_URL}/${shortUrl}`);
                
                // First, try a simple HEAD request to check if it exists
                const headResponse = await fetch(`${API_URL}/${shortUrl}`, {
                    method: "HEAD",
                    mode: "cors"
                }).catch(error => {
                    console.error("HEAD request error:", error);
                    return null;
                });

                if (headResponse === null) {
                    loadingDiv.style.display = "none";
                    // If CORS request fails, provide instructions
                    const linkHtml = `<strong>Short Code:</strong> <div class="code-block">${shortUrl}</div>
                        <p style="margin-top: 15px; color: #555;">The browser CORS policy is preventing the test. You can still use the URL directly:</p>
                        <div class="redirect-link" style="margin-top: 10px;">
                            <a href="${API_URL}/${shortUrl}" target="_blank" style="display: inline-block;">↗ Test in new tab: ${API_URL}/${shortUrl}</a>
                        </div>`;
                    showMessage(messageDiv, linkHtml, "warning");
                    return;
                }

                // Now try the full GET request
                const response = await fetch(`${API_URL}/${shortUrl}`, {
                    redirect: "manual",
                    method: "GET",
                    mode: "cors"
                });

                loadingDiv.style.display = "none";

                console.log(`Response status: ${response.status}`);

                if (response.status === 302 || response.status === 301) {
                    const redirectUrl = response.headers.get("Location");
                    const linkHtml = `✅ Redirect Found!<br><strong>Status Code:</strong> ${response.status}<br><strong>Short Code:</strong> <div class="code-block">${shortUrl}</div><strong>Redirects to:</strong><div class="code-block">${redirectUrl}</div><div class="redirect-link"><a href="${redirectUrl}" target="_blank">Click to follow redirect →</a></div>`;
                    showMessage(messageDiv, linkHtml, "success");
                } else if (response.status === 404) {
                    showMessage(messageDiv, `⚠️ Short URL "${shortUrl}" not found (404). Make sure the code is correct.`, "warning");
                } else if (response.ok) {
                    showMessage(messageDiv, `✅ Response received (Status ${response.status})`, "success");
                } else if (response.status === 0) {
                    const linkHtml = `<strong>Short Code:</strong> <div class="code-block">${shortUrl}</div>
                        <p style="margin-top: 15px; color: #555;">The browser CORS policy is preventing the test. You can still use the URL directly:</p>
                        <div class="redirect-link" style="margin-top: 10px;">
                            <a href="${API_URL}/${shortUrl}" target="_blank" style="display: inline-block;">↗ Test in new tab: ${API_URL}/${shortUrl}</a>
                        </div>`;
                    showMessage(messageDiv, linkHtml, "warning");
                } else {
                    showMessage(messageDiv, `Unexpected status code: ${response.status}`, "error");
                }
            } catch (error) {
                loadingDiv.style.display = "none";
                console.error("Error details:", error);
                
                // Provide a workaround
                const linkHtml = `<strong>Short Code:</strong> <div class="code-block">${shortUrl}</div>
                    <p style="margin-top: 15px; color: #555;">Cannot test via browser API. Use this link instead:</p>
                    <div class="redirect-link" style="margin-top: 10px;">
                        <a href="${API_URL}/${shortUrl}" target="_blank" style="display: inline-block;">↗ Test in new tab: ${API_URL}/${shortUrl}</a>
                    </div>`;
                showMessage(messageDiv, linkHtml, "warning");
            }
        }

        async function testLastCreatedUrl() {
            const shortUrl = localStorage.getItem("lastShortUrl");
            const messageDiv = document.getElementById("quickTestMessage");

            if (!shortUrl) {
                showMessage(messageDiv, "Create a short URL first", "warning");
                return;
            }

            messageDiv.classList.remove("show");
            const shortCode = shortUrl.split("/").pop();

            try {
                const response = await fetch(`${API_URL}/${shortCode}`, {
                    redirect: "manual",
                    method: "GET",
                    mode: "cors"
                });

                if (response.status === 302 || response.status === 301) {
                    const redirectUrl = response.headers.get("Location");
                    const originalUrl = localStorage.getItem("lastLongUrl");

                    if (redirectUrl === originalUrl) {
                        showMessage(messageDiv, "✅ URL correctly redirects to original!", "success");
                    } else {
                        showMessage(messageDiv, `⚠️ URL redirects to: ${redirectUrl}`, "warning");
                    }
                } else if (response.ok) {
                    showMessage(messageDiv, `✅ Response received (Status ${response.status})`, "success");
                } else {
                    showMessage(messageDiv, `Cannot test: Status ${response.status}. <a href="${API_URL}/${shortCode}" target="_blank">Test in new tab →</a>`, "warning");
                }
            } catch (error) {
                console.error("Error details:", error);
                showMessage(messageDiv, `<a href="${API_URL}/${shortCode}" target="_blank">Test in new tab →</a>`, "warning");
            }
        }

        function showMessage(element, message, type) {
            element.innerHTML = message;
            element.className = `message show ${type}`;
        }

        function updateActivitySection() {
            const lastShortUrl = localStorage.getItem("lastShortUrl");
            const lastLongUrl = localStorage.getItem("lastLongUrl");

            if (lastShortUrl) {
                document.getElementById("lastShortUrl").textContent = lastShortUrl;
            }
            if (lastLongUrl) {
                document.getElementById("lastLongUrl").textContent = lastLongUrl;
            }
        }

        // Load activity on page load
        window.addEventListener("load", updateActivitySection);
    </script>
</body>
</html>
