services:
  postgres-db:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=UrlShortner'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  shorturl-app:
    build: .
    ports:
      - '8080:8080' # Exposes your Spring Boot app to your host machine
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      # This is the magic line. It overrides your application.properties
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/UrlShortner
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=2
      - SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000
      - SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT=600000
      - SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=1800000